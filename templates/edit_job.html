<!DOCTYPE html>
<html lang="en">
<head>
    <title>Edit Job • CareerPilot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

:root{
    --bg:#0b1220;
    --panel:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.08);
    --text:#ffffff;
    --muted:#94a3b8;
    --primary:#2563eb;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.edit-card{
    width:100%;
    max-width:500px;
    background:var(--panel);
    border:1px solid var(--border);
    backdrop-filter:blur(14px);
    border-radius:24px;
    padding:30px;
    animation:fadeUp 0.5s ease;
}

h1{
    margin-bottom:25px;
    font-size:28px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    color:var(--muted);
    font-size:14px;
}

input,
select,
textarea{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:14px;
    background:#111827;
    color:white;
    font-size:15px;
}

textarea{
    resize:none;
    height:100px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:var(--primary);
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    opacity:0.9;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:600px){

    .edit-card{
        padding:22px;
    }

    h1{
        font-size:22px;
    }

}

</style>
</head>

<body>

<div class="edit-card">

    <h1>Edit Job</h1>

    <form method="POST">

        <div class="form-group">
            <label>Company</label>
            <input type="text"
                   name="company"
                   value="{{ job.company }}">
        </div>

        <div class="form-group">
            <label>Role</label>
            <input type="text"
                   name="role"
                   value="{{ job.role }}">
        </div>

        <div class="form-group">
            <label>Status</label>

            <select name="status">

                <option value="Applied"
                    {% if job.status == "Applied" %}selected{% endif %}>
                    Applied
                </option>

                <option value="Interview"
                    {% if job.status == "Interview" %}selected{% endif %}>
                    Interview
                </option>

                <option value="Rejected"
                    {% if job.status == "Rejected" %}selected{% endif %}>
                    Rejected
                </option>

            </select>

        </div>

        <div class="form-group">
            <label>Salary</label>
            <input type="text"
                   name="salary"
                   value="{{ job.salary }}">
        </div>

        <div class="form-group">
            <label>Work Type</label>
            <input type="text"
                   name="work_type"
                   value="{{ job.work_type }}">
        </div>

        <div class="form-group">
            <label>Location</label>
            <input type="text"
                   name="location"
                   value="{{ job.location }}">
        </div>

        <div class="form-group">
            <label>Notes</label>

            <textarea name="notes">{{ job.notes }}</textarea>
        </div>

        <button type="submit">
            Save Changes
        </button>

    </form>

</div>

</body>
</html>
