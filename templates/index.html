<!DOCTYPE html>
<html lang="en">
<head>
    <title>CareerPilot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1220;
            color: white;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
        }

        .subtitle {
            color: #94a3b8;
            margin-top: 10px;
            font-size: 18px;
            max-width: 500px;
        }

        .btns {
            margin-top: 30px;
        }

        .btn {
            padding: 12px 18px;
            margin: 10px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
        }

        .primary {
            background: #38bdf8;
            color: black;
        }

        .secondary {
            background: transparent;
            border: 1px solid #38bdf8;
            color: #38bdf8;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 60px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 16px;
            width: 200px;
        }

        .card h3 {
            color: #38bdf8;
        }
    </style>
</head>

<body>

<div class="hero">
    <div class="title">CareerPilot 🚀</div>

    <div class="subtitle">
        Track your job applications, manage interviews, and stay ahead in your career — all in one place.
    </div>

    <div class="btns">
        <a href="/register" class="btn primary">Get Started</a>
        <a href="/login" class="btn secondary">Login</a>
    </div>

    <div class="features">
        <div class="card">
            <h3>📊 Track</h3>
            <p>All your job applications in one dashboard</p>
        </div>

        <div class="card">
            <h3>🎯 Manage</h3>
            <p>Organize interviews and statuses easily</p>
        </div>

        <div class="card">
            <h3>🚀 Grow</h3>
            <p>Stay ahead with structured job tracking</p>
        </div>
    </div>
</div>

</body>
</html>
